[build]
  command = "npm run build"
  publish = "public"

[functions]
  node_bundle = true
  # Xenova needs to stay as an external module to avoid bundling issues with the WASM/model files
  external_node_modules = ["@xenova/transformers", "@lancedb/lancedb"]

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200