[build]
  command = "npm install && mkdir -p public && echo 'MCP Active' > public/index.html"
  publish = "public"
[functions]
  included_files = ["mt5-vectors/**"]
  external_node_modules = ["@xenova/transformers", "@lancedb/lancedb", "apache-arrow"]
[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200